<!DOCTYPE html>
<html>

<head>
<title>Scan QR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="container mt-4 text-center">

<h3>Scan QR Code</h3>

<div id="reader" class="d-inline-block mt-4" style="width:300px;"></div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

function getLocalDateString(){
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
}

async function onScanSuccess(decodedText){
    try {
        const res = await fetch("http://localhost:5000/api/attendance/mark",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                studentId: user.studentId || user.wardId || "",
                studentName: user.name || user.wardName || "Unknown",
                room: user.room || 0,
                hostelName: user.hostelName || "",
                date: getLocalDateString(),
                status: "PRESENT"
            })
        });

        if(!res.ok){
            alert("Could not mark attendance. Please try again.");
            return;
        }

        alert("Attendance Marked");
    } catch (error) {
        alert("Network error while marking attendance.");
    }
}

new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
).render(onScanSuccess);

</script>

</body>
</html>
