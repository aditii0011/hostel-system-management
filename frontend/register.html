<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card w-100" style="max-width: 520px;">
    <h2 class="text-center">Create Account</h2>

    <select id="role" class="form-control mt-3" onchange="toggleForm()">
        <option value="">Select Role *</option>
        <option value="student">Student</option>
        <option value="parent">Parent</option>
    </select>

    <input id="name" class="form-control mt-3" placeholder="Name *" required>
    <input id="email" class="form-control mt-3" placeholder="Email *" required>
    <input id="password" type="password" class="form-control mt-3" placeholder="Password *" required>


<!-- student fields -->

<div id="studentFields" style="display:none">

<input id="studentId" class="form-control mt-3" placeholder="Student ID *">

<input id="studentPhone" class="form-control mt-3" placeholder="Student Phone *">

<select id="hostelName" class="form-control mt-3">
<option>Select Hostel *</option>
</select>

<input id="room" class="form-control mt-3" placeholder="Room No *">

<input id="parentName" class="form-control mt-3" placeholder="Parent Name *">

<input id="parentPhone" class="form-control mt-3" placeholder="Parent Phone *">

</div>


<!-- parent fields -->

<div id="parentFields" style="display:none">

<input id="phone" class="form-control mt-3" placeholder="Parent Phone *">

<input id="wardId" class="form-control mt-3" placeholder="Student ID *">

<input id="wardName" class="form-control mt-3" placeholder="Student Name *">

</div>

<button onclick="register()" class="btn btn-success mt-4 w-100">
Register
</button>

<script src="js/register.js"></script>

</div>
</body>
</html>
