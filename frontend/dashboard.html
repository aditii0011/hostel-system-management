<!DOCTYPE html>
<html lang="en">
<head>
<title>Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark text-white">
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Welcome Back</h1>
            <p class="text-secondary mb-0">Your student dashboard for attendance and leave tracking.</p>
        </div>
        <button class="btn btn-danger" onclick="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card dashboard-card p-4">
                <div class="d-flex align-items-center">
                    <div class="me-3 card-icon bg-white text-dark rounded-circle p-3">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <div>
                        <h5 class="card-title mb-1">Student</h5>
                        <p class="card-text mb-0">Name: <span id="studentName">-</span></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card dashboard-card p-4">
                <div class="d-flex align-items-center">
                    <div class="me-3 card-icon bg-white text-dark rounded-circle p-3">
                        <i class="bi bi-building"></i>
                    </div>
                    <div>
                        <h5 class="card-title mb-1">Hostel</h5>
                        <p class="card-text mb-0"><span id="studentHostel">-</span></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card dashboard-card p-4">
                <div class="d-flex align-items-center">
                    <div class="me-3 card-icon bg-white text-dark rounded-circle p-3">
                        <i class="bi bi-door-open"></i>
                    </div>
                    <div>
                        <h5 class="card-title mb-1">Room</h5>
                        <p class="card-text mb-0"><span id="studentRoom">-</span></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card dashboard-card p-4">
                <div class="d-flex align-items-center">
                    <div class="me-3 card-icon bg-white text-dark rounded-circle p-3">
                        <i class="bi bi-clock-history"></i>
                    </div>
                    <div>
                        <h5 class="card-title mb-1">Status</h5>
                        <p class="card-text mb-0">Quick access to your activity</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <button class="btn btn-primary w-100 py-3" onclick="goScan()">
                <i class="bi bi-qr-code-scan me-2"></i>Scan QR
            </button>
        </div>
        <div class="col-md-4">
            <button class="btn btn-success w-100 py-3" onclick="showAttendance(event)">
                <i class="bi bi-calendar-check me-2"></i>Attendance History
            </button>
        </div>
        <div class="col-md-4">
            <button class="btn btn-warning w-100 py-3" onclick="showLeave(event)">
                <i class="bi bi-envelope-check me-2"></i>Leave Status
            </button>
        </div>
    </div>

    <div id="output" class="mt-4"></div>
</div>

<script src="js/logout.js"></script>
<script src="js/student.js"></script>
</body>
</html>
