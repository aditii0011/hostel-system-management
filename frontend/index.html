<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card w-100" style="max-width: 420px;">
    <h2 class="text-center">Hostel System Login</h2>

    <input id="email" class="form-control mt-3" placeholder="Email">
    <input id="password" type="password" class="form-control mt-3" placeholder="Password">

    <button onclick="login()" class="btn btn-primary mt-4 w-100">Login</button>
    <a href="register.html" class="btn btn-success mt-3 w-100">Create Account</a>
</div>

<script src="js/app.js"></script>
</body>
</html>
